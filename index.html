<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAISON KLUCCÍ | L'Art du Regard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header style="background-color: #C5B8B2; padding: 40px 20px; text-align: center;">
        <img src="logo-klucci.png" alt="Maison Kluccí" style="max-width: 400px; width: 100%; height: auto;">
        
        <nav style="margin-top: 30px;">
            <ul style="display: flex; justify-content: center; list-style: none; padding: 0; margin: 0; gap: 30px;">
                <li><a href="#" class="nav-link">Accueil</a></li>
                <li><a href="#" class="nav-link">Boutique</a></li>
                <li><a href="#" class="nav-link">Philosophie</a></li>
                <li><a href="#" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" style="background-color: #C5B8B2; height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center; color: #2B1511;">
        <div style="padding: 0 10%;">
            <h1 style="font-size: 40px; font-weight: 400; margin-bottom: 20px;">Révélez votre éclat naturel.</h1>
            <p style="font-size: 18px; max-width: 600px; margin: 0 auto 30px;">Des cils conçus pour sublimer, pas pour transformer.</p>
            <a href="#" class="btn">Découvrir la collection</a>
        </div>
    </section>

    <section class="products" style="padding: 80px 10%;">
        <h2 style="text-align: center; margin-bottom: 60px; font-weight: 400; text-transform: uppercase; letter-spacing: 2px;">La Collection</h2>
        
        <div class="product-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px;">
            <div class="product-card" style="text-align: center;">
                <img src="IMG_0306.png" alt="Cils Le Discret" style="width:100%; height:400px; object-fit:cover; margin-bottom: 20px;">
                <h3 style="font-size: 18px;">Le Discret</h3>
                <p style="color: #C5B8B2; font-weight: bold;">19.00€</p>
                <button class="shop-btn">Ajouter au panier</button>
            </div>

            <div class="product-card" style="text-align: center;">
                <img src="IMG_0308.jpeg" alt="Cils Le Volumineux" style="width:100%; height:400px; object-fit:cover; margin-bottom: 20px;">
                <h3 style="font-size: 18px;">Le Volumineux</h3>
                <p style="color: #C5B8B2; font-weight: bold;">24.00€</p>
                <button class="shop-btn">Ajouter au panier</button>
            </div>

            <div class="product-card" style="text-align: center;">
                <img src="IMG_0311.png" alt="Cils Le Signature" style="width:100%; height:400px; object-fit:cover; margin-bottom: 20px;">
                <h3 style="font-size: 18px;">Le Signature</h3>
                <p style="color: #C5B8B2; font-weight: bold;">22.00€</p>
                <button class="shop-btn">Ajouter au panier</button>
            </div>
        </div>
    </section>

    <footer style="text-align: center; padding: 60px; background: #2B1511; color: #FFFFFF;">
        <p style="font-size: 12px; letter-spacing: 1px;">© 2026 MAISON KLUCCÍ | UV LASH TECHNOLOGY</p>
    </footer>

</body>
</html>
